<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Canal OpenCaster</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      background: #0c0c0c;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background: #ff6600;
      padding: 15px;
      font-size: 1.5em;
      font-weight: bold;
    }
    video {
      width: 80%;
      max-width: 900px;
      margin: 20px auto;
      display: block;
      border: 3px solid #ff6600;
      border-radius: 8px;
    }
    section {
      margin: 30px auto;
      width: 80%;
      max-width: 900px;
      text-align: left;
    }
    .chat {
      border: 2px solid #444;
      border-radius: 8px;
      height: 400px;
      background: #1a1a1a;
      overflow: hidden;
    }
    footer {
      background: #222;
      padding: 15px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>📺 Meu Canal OpenCaster</header>

  <video id="video" controls autoplay></video>

  <script>
    const video = document.getElementById('video');
    const url = "https://vs20.live.opencaster.com/wow_802e52cd/index.m3u8"; // seu link M3U
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    }
  </script>

  <section>
    <h2>💬 Chat ao vivo</h2>
    <div class="chat">
      <!-- Exemplo: embed de Chatango ou Tawk.to -->
      <iframe src="https://chatango.com/iframe" width="100%" height="100%" frameborder="0"></iframe>
    </div>
  </section>

  <footer>
    Este projeto é experimental e sem fins lucrativos.  
    Todo o conteúdo pertence aos respectivos detentores de direitos.  
    Caso algum titular solicite, o material será removido em até 24h.  
    Apoie sempre as versões oficiais.
  </footer>
</body>
</html>
