<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>WOW :: Meu Canal</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    header {
      background: #ff6600;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
    }
    main {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      margin: 20px;
    }
    video {
      width: 70%;
      max-width: 900px;
      border: 3px solid #ff6600;
      border-radius: 8px;
    }
    .chat {
      width: 30%;
      height: 500px;
      margin-left: 20px;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }
    footer {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>📺 WOW :: Canal OpenCaster</header>

  <main>
    <video id="video" controls autoplay></video>
    <div class="chat">
      <!-- Chat embutido (exemplo Chatango/Tawk.to) -->
      <iframe src="https://chatango.com/iframe" width="100%" height="100%" frameborder="0"></iframe>
    </div>
  </main>

  <script>
    const video = document.getElementById('video');
    const url = "https://vs20.live.opencaster.com/wow_802e52cd/index.m3u8"; // seu link M3U
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    }
  </script>

  <footer>
    Este projeto é experimental e sem fins lucrativos.  
    Todo o conteúdo pertence aos respectivos detentores de direitos.  
    Caso algum titular solicite, o material será removido em até 24h.  
    Apoie sempre as versões oficiais.
  </footer>
</body>
</html>

</body>
</html>
